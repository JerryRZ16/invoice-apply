<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>开票功能原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f5; color: #333; max-width: 430px; margin: 0 auto; min-height: 100vh;
    padding: 40px 20px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .desc { font-size: 14px; color: #999; margin-bottom: 32px; }
  .card {
    background: #fff; border-radius: 14px; padding: 20px;
    margin-bottom: 14px; text-decoration: none; display: block;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: transform 0.15s;
  }
  .card:active { transform: scale(0.98); }
  .card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #999; line-height: 1.5; }
  .card-arrow { float: right; color: #ccc; font-size: 18px; margin-top: -22px; }
</style>
</head>
<body>
  <h1>开票功能原型</h1>
  <p class="desc">霸王茶姬 · 电子发票模块</p>

  <a class="card" href="invoice.html">
    <div class="card-title">📄 电子发票申请</div>
    <div class="card-desc">基础开票页面：金额展示、购方抬头、发票类型选择、邮箱填写</div>
    <span class="card-arrow">›</span>
  </a>

  <a class="card" href="category.html">
    <div class="card-title">🏷️ 开票类目分组 & 资质查询</div>
    <div class="card-desc">类目分组展示（原有类目 / 餐饮服务费）、发票类型自动匹配、纳税人资质实时查询</div>
    <span class="card-arrow">›</span>
  </a>
</body>
</html>
